name: Build Android

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".codewhale/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Init Android project
        run: npx tauri android init

      - name: Patch AndroidManifest (adjustResize for keyboard)
        run: |
          manifest=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if ! grep -q windowSoftInputMode "$manifest"; then
            sed -i 's/<activity/<activity android:windowSoftInputMode="adjustResize"/' "$manifest"
          fi
          grep windowSoftInputMode "$manifest"

      - name: Build Tauri Android (release APK + AAB)
        run: npm run tauri android build

      - name: Build Tauri Android (debug APK, installable)
        run: npm run tauri android build -- --debug --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MySillyTavern-Android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
